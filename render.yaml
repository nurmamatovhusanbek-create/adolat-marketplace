# Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  # === Web service (Next.js app) ===
  - type: web
    name: adolat-marketplace
    runtime: docker
    plan: free  # Upgrade to 'starter' ($7/mo) for no sleep + more RAM
    region: singapore  # Closest to Uzbekistan
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adolat-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false  # Set manually: https://adolat-marketplace.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false  # Set manually — any 32+ char random string
      - key: ENABLE_SIGNUP
        value: "true"
      - key: ENABLE_ADVOCATE_SIGNUP
        value: "true"

  # === PostgreSQL database ===
  - type: psql
    name: adolat-db
    plan: free  # 1 GB storage, expires after 30 days on free tier
    # Upgrade to 'starter' ($7/mo) for 10 GB + no expiry
    ipAllowList: []  # Allow all IPs (or restrict to Render internal)
    database: adolat
    user: adolat_admin
